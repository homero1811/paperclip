services:
  paperclip:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      PAPERCLIP_HOME: "/paperclip"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_MIGRATION_AUTO_APPLY: "true"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      PAPERCLIP_AUTO_PROVISION: "${PAPERCLIP_AUTO_PROVISION:-false}"
      PAPERCLIP_BOOTSTRAP_ADMIN_EMAIL: "${PAPERCLIP_BOOTSTRAP_ADMIN_EMAIL:-}"
      PAPERCLIP_PROVISION_COMPANY_NAME: "${PAPERCLIP_PROVISION_COMPANY_NAME:-}"
      PAPERCLIP_PROVISION_CEO_NAME: "${PAPERCLIP_PROVISION_CEO_NAME:-}"
      PAPERCLIP_PROVISION_CEO_ADAPTER: "${PAPERCLIP_PROVISION_CEO_ADAPTER:-}"
      PAPERCLIP_PROVISION_CEO_MODEL: "${PAPERCLIP_PROVISION_CEO_MODEL:-}"
      PAPERCLIP_PROVISION_CEO_CWD: "${PAPERCLIP_PROVISION_CEO_CWD:-}"
      PAPERCLIP_PROVISION_COMPANY_MISSION: "${PAPERCLIP_PROVISION_COMPANY_MISSION:-}"
    volumes:
      - "${PAPERCLIP_DATA_DIR:-./data/docker-paperclip}:/paperclip"

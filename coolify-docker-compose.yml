services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U paperclip -d paperclip
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  server:
    image: ghcr.io/homero1811/paperclip:latest
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: '3100'
      HOST: '0.0.0.0'
      SERVE_UI: 'true'
      PAPERCLIP_DEPLOYMENT_MODE: ${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}
      PAPERCLIP_DEPLOYMENT_EXPOSURE: ${PAPERCLIP_DEPLOYMENT_EXPOSURE:-public}
      PAPERCLIP_MIGRATION_AUTO_APPLY: 'true'
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-${PAPERCLIP_PUBLIC_URL}}
      PAPERCLIP_AUTO_PROVISION: ${PAPERCLIP_AUTO_PROVISION:-true}
      PAPERCLIP_BOOTSTRAP_ADMIN_EMAIL: ${PAPERCLIP_BOOTSTRAP_ADMIN_EMAIL:-}
      PAPERCLIP_PROVISION_COMPANY_NAME: ${PAPERCLIP_PROVISION_COMPANY_NAME:-}
      PAPERCLIP_PROVISION_CEO_NAME: ${PAPERCLIP_PROVISION_CEO_NAME:-CEO}
      PAPERCLIP_PROVISION_CEO_ADAPTER: ${PAPERCLIP_PROVISION_CEO_ADAPTER:-claude_local}
      PAPERCLIP_PROVISION_CEO_MODEL: ${PAPERCLIP_PROVISION_CEO_MODEL:-claude-opus-4-5}
      PAPERCLIP_PROVISION_CEO_CWD: ${PAPERCLIP_PROVISION_CEO_CWD:-}
      PAPERCLIP_PROVISION_COMPANY_MISSION: ${PAPERCLIP_PROVISION_COMPANY_MISSION:-}
      PAPERCLIP_PROVISION_AGENCY_AGENTS: ${PAPERCLIP_PROVISION_AGENCY_AGENTS:-true}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy
    expose:
      - 3100
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://localhost:3100/api/health || exit 1
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.paperclip.rule=Host(`${PAPERCLIP_DOMAIN}`)
      - traefik.http.routers.paperclip.entrypoints=websecure
      - traefik.http.routers.paperclip.tls.certresolver=letsencrypt
      - traefik.http.services.paperclip.loadbalancer.server.port=3100
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  pgdata:
  paperclip-data:
